# =============================================================================
# .github/workflows/ci-cd.yml
# Git Repository Archiver — Full CI/CD Pipeline
#
# Stages (in order):
#   1. lint-and-format   — flake8 + black --check
#   2. unit-tests        — pytest + coverage >= 80%
#   3. build             — docker build (on develop / main push)
#   4. security-scan     — Trivy image scan (fails on CRITICAL CVEs)
#   5. push-registry     — push to GHCR (main branch only)
#   6. deploy-staging    — kubectl apply (main branch only)
#
# Branch triggers:
#   - Every push to develop or main
#   - Every PR targeting develop
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop

# Cancel in-flight runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

# =============================================================================
# Job 1 — Lint & Format Check
# =============================================================================
jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install flake8 black
          pip install -r src/main/requirements.txt
          pip install -e .

      - name: Run flake8 (PEP8 + style)
        run: |
          flake8 src/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503

      - name: Run black (formatting check)
        run: |
          black --check --diff src/ tests/

# =============================================================================
# Job 2 — Unit Tests & Coverage
# =============================================================================
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-format

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r src/main/requirements.txt
          pip install -e .

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=src/main \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

# =============================================================================
# Job 3 — Build Docker Image
# =============================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only build on pushes to develop or main (not on PRs)
    if: github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker image (no push at this stage)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Export to Docker daemon so Trivy can scan it in the next job
          load: true

      - name: Save image to tarball for Trivy
        run: |
          docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD) \
            -o /tmp/image.tar

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

# =============================================================================
# Job 4 — Security Scan (Trivy)
# Must run AFTER build so Trivy scans the actual built image, not a base image.
# Pipeline FAILS on CRITICAL CVEs (exit code 1).
# =============================================================================
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image into Docker daemon
        run: docker load -i /tmp/image.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          format: "table"
          exit-code: "1"            # FAIL the pipeline on critical CVEs
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          vuln-type: "os,library"
          timeout: "10m"

      - name: Run Trivy SARIF report (for GitHub Security tab)
        uses: aquasecurity/trivy-action@0.20.0
        if: always()               # Upload even if scan fails
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          timeout: "10m"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

# =============================================================================
# Job 5 — Push to Container Registry (main branch only)
# =============================================================================
  push-registry:
    name: Push to Registry
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN is automatically provided — never hardcode tokens here
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# =============================================================================
# Job 6 — Deploy to Staging (main branch only)
# =============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: push-registry
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Configure kubectl credentials
        # KUBE_CONFIG_DATA must be base64-encoded kubeconfig stored as a GitHub Secret
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tag in deployment manifest
        run: |
          IMAGE_TAG="sha-$(git rev-parse --short HEAD)"
          sed -i "s|ghcr.io/your-org/devops-project-git-archiver:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}|g" \
            infrastructure/kubernetes/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infrastructure/kubernetes/configmap.yaml
          kubectl apply -f infrastructure/kubernetes/deployment.yaml
          kubectl apply -f infrastructure/kubernetes/service.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/git-archiver \
            --namespace=default \
            --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -l app=git-archiver -n default
          kubectl get deployment git-archiver -n default
