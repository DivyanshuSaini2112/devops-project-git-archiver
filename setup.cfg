[flake8]
max-line-length = 100
extend-ignore =
    E203,   # whitespace before ':'  (conflicts with black)
    W503,   # line break before binary operator (conflicts with black)
    E501    # line too long (handled by black)
exclude =
    .git,
    __pycache__,
    venv,
    .venv,
    build,
    dist,
    *.egg-info,
    src/config/

per-file-ignores =
    tests/*: S101   # allow assert in tests

[tool:black]
line-length = 100
target-version = py311
