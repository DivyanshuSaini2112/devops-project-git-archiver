apiVersion: v1
kind: Service
metadata:
  name: git-archiver
  namespace: default
  labels:
    app: git-archiver
    version: "1.0"
spec:
  # ClusterIP — batch job pattern, no external port exposure needed.
  # Internal services (monitoring, log scrapers) can reach the pod via
  # http://git-archiver.default.svc.cluster.local if needed.
  type: ClusterIP
  selector:
    app: git-archiver
  ports:
    # Placeholder port — the archiver itself does not serve HTTP traffic.
    # Remove or replace if a metrics endpoint (e.g. Prometheus /metrics) is added.
    - name: metrics
      protocol: TCP
      port: 8080
      targetPort: 8080
