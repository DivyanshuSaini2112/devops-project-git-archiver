# =============================================================================
# monitoring/nagios/commands.cfg
# Nagios command definitions for the Git Repository Archiver host.
# =============================================================================

# -----------------------------------------------------------------------------
# CPU Load
# Thresholds: warning at 5,4,3 (1m,5m,15m) / critical at 10,8,6
# -----------------------------------------------------------------------------
define command {
    command_name    check_load
    command_line    $USER1$/check_load \
                        -w 5,4,3 \
                        -c 10,8,6
}

# -----------------------------------------------------------------------------
# Disk Space — monitors /app/archives
# Thresholds: warning < 20% free / critical < 10% free
# -----------------------------------------------------------------------------
define command {
    command_name    check_disk_archives
    command_line    $USER1$/check_disk \
                        -w 20% \
                        -c 10% \
                        -p /app/archives
}

# Generic disk check (root filesystem)
define command {
    command_name    check_disk
    command_line    $USER1$/check_disk \
                        -w 20% \
                        -c 10% \
                        -p /
}

# -----------------------------------------------------------------------------
# Memory Usage
# Thresholds: warning > 80% used / critical > 95% used
# Uses check_mem plugin (install: nagios-plugins-mem or equivalent)
# -----------------------------------------------------------------------------
define command {
    command_name    check_mem
    command_line    $USER1$/check_mem \
                        -w 80 \
                        -c 95
}

# -----------------------------------------------------------------------------
# Process Check — verify archiver Python process is running
# Warning/Critical threshold: < 1 matching process
# -----------------------------------------------------------------------------
define command {
    command_name    check_archiver_proc
    command_line    $USER1$/check_procs \
                        -c 1: \
                        -C python \
                        -a "src.main.archiver"
}

# -----------------------------------------------------------------------------
# SSH connectivity (standard Nagios)
# -----------------------------------------------------------------------------
define command {
    command_name    check_ssh
    command_line    $USER1$/check_ssh \
                        -H $HOSTADDRESS$
}

# -----------------------------------------------------------------------------
# PING / Host alive
# -----------------------------------------------------------------------------
define command {
    command_name    check_ping
    command_line    $USER1$/check_ping \
                        -H $HOSTADDRESS$ \
                        -w 100.0,20% \
                        -c 500.0,60% \
                        -p 5
}
