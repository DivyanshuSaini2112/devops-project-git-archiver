# =============================================================================
# monitoring/nagios/check_archiver.cfg
# Nagios host and service checks for the Git Repository Archiver.
#
# Prerequisites:
#   - Import commands.cfg before this file in nagios.cfg
#   - Replace ARCHIVER_HOST_IP with the actual host/container IP
# =============================================================================

# -----------------------------------------------------------------------------
# Host definition
# -----------------------------------------------------------------------------
define host {
    use                 linux-server
    host_name           git-archiver
    alias               Git Repository Archiver
    address             ARCHIVER_HOST_IP        ; Replace with real IP or hostname
    max_check_attempts  3
    check_interval      5
    retry_interval      1
    check_command       check_ping
    notification_interval 60
    notification_period 24x7
    contact_groups      admins
}

# -----------------------------------------------------------------------------
# Service: CPU Load
# -----------------------------------------------------------------------------
define service {
    use                     generic-service
    host_name               git-archiver
    service_description     CPU Load
    check_command           check_load
    check_interval          5
    retry_interval          1
    max_check_attempts      3
    notification_interval   30
    notification_period     24x7
    contact_groups          admins
}

# -----------------------------------------------------------------------------
# Service: Disk Space — /app/archives
# -----------------------------------------------------------------------------
define service {
    use                     generic-service
    host_name               git-archiver
    service_description     Disk Space /app/archives
    check_command           check_disk_archives
    check_interval          10
    retry_interval          2
    max_check_attempts      3
    notification_interval   60
    notification_period     24x7
    contact_groups          admins
    notes                   Archive storage directory. Alerts at <20%% free (warn) and <10%% free (crit).
}

# -----------------------------------------------------------------------------
# Service: Memory Usage
# -----------------------------------------------------------------------------
define service {
    use                     generic-service
    host_name               git-archiver
    service_description     Memory Usage
    check_command           check_mem
    check_interval          5
    retry_interval          1
    max_check_attempts      3
    notification_interval   30
    notification_period     24x7
    contact_groups          admins
}

# -----------------------------------------------------------------------------
# Service: Archiver Process Running
# -----------------------------------------------------------------------------
define service {
    use                     generic-service
    host_name               git-archiver
    service_description     Archiver Process
    check_command           check_archiver_proc
    check_interval          2
    retry_interval          1
    max_check_attempts      3
    notification_interval   15
    notification_period     24x7
    contact_groups          admins
    notes                   Verifies that the Python archiver process is running.
}

# -----------------------------------------------------------------------------
# Service: SSH Connectivity
# -----------------------------------------------------------------------------
define service {
    use                     generic-service
    host_name               git-archiver
    service_description     SSH
    check_command           check_ssh
    check_interval          10
    retry_interval          2
    max_check_attempts      3
    notification_interval   60
    notification_period     24x7
    contact_groups          admins
}
